experiment: exp1_siren_xyz_to_u
exp_id: siren-xyz-u
experiment_root: experiments
data:
  dataset_name: xyz_u
  split: train
  data_root: ./data
  x_path: ./data/raw/xyz_u/train/coords_xyz.npy
  y_path: ./data/raw/xyz_u/train/targets_u.npy
  normalize: true
model:
  name: siren
  in_features: 3
  out_features: 3
  hidden_features: 512
  hidden_layers: 5
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  outermost_linear: true
training:
  epochs: 500
  batch_size: 131072
  pred_batch_size: 131072
  lr: 5.0e-5
  val_split: 0.1
  log_every: 4
  save_every: 10
  early_stop_patience: 0
  seed: 42
