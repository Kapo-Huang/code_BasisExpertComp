experiment: exp_data_ionization_base_shared_enc_view_add_shared_dec_trunk
exp_id: baseline-base_shared_enc_view_add_shared_dec_trunk-ionization
experiment_root: experiments
data:
  dataset_name: ionization
  split: train
  target_stats_path: ./data/raw/ionization/train/target_stats_multi.npz
  compute_target_stats: true
  data_root: ./data
  volume_shape:
    X: 600
    Y: 248
    Z: 248
    T: 10
  target_dir: ./data/raw/ionization/train
  normalize: true
model:
  name: base_shared_enc_view_add_shared_dec_trunk
  in_features: 4
  base_dim: 8
  shared_num_frequencies: 6
  shared_num_layers: 2
  decoder_num_layers: 2
  shared_first_omega_0: 30.0
  shared_hidden_omega_0: 30.0
  decoder_first_omega_0: 30.0
  decoder_hidden_omega_0: 30.0
training:
  epochs: 60
  batch_size: 8192
  pred_batch_size: 8192
  lr: 5.0e-5
  val_split: 0.1
  log_every: 1
  save_every: 5
  early_stop_patience: 0
  seed: 42
  loss_type: mse
  lam_eq: 0.0
  gam_div: 0.0
