experiment: exp_coordnet_xyzt_to_velocity
exp_id: coordnet-ocean-velocity-sub
experiment_root: experiments
data:
  dataset_name: ocean
  split: train
  data_root: ./data
  x_path: ./data/raw/ocean/train/data_XYZT_sub.npy
  y_path: ./data/raw/ocean/train/data_V_time_sub.npy
  normalize: true
model:
  name: coordnet
  in_features: 4
  out_features: 3
  init_features: 64
  num_res: 10
training:
  epochs: 60
  batch_size: 8192
  pred_batch_size: 8192
  lr: 5.0e-5
  val_split: 0.1
  log_every: 1
  save_every: 5
  early_stop_patience: 0
  seed: 42
